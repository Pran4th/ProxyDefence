version: "3.9"

networks:
  proxy_net:
    driver: bridge

services:
  # --- Infrastructure Services ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    networks:
      - proxy_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    networks:
      - proxy_net
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    networks:
      - proxy_net
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: defenseintel
    volumes:
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d defenseintel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application Microservices ---
  ingest-service:
    build: ./services/ingest-service
    container_name: ingest-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NEWS_API_KEY: "c71b58c8fa8b330a50b995521f6ba575"
    ports:
      - "8001:8000"
    networks:
      - proxy_net
    depends_on:
      kafka:
        condition: service_healthy

  ml-service:
    build: ./services/ml-service
    container_name: ml-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8002:8000"
    networks:
      - proxy_net
    depends_on:
      kafka:
        condition: service_healthy
  
  database-service:
    build: ./services/database-service
    container_name: database-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: defenseintel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      ELASTICSEARCH_HOST: elasticsearch
    ports:
      - "8003:8000"
    networks:
      - proxy_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  conflict-api:
    build: ./services/conflict-api
    container_name: conflict-api
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_DB: defenseintel
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      ELASTICSEARCH_HOST: elasticsearch
    ports:
      - "8004:8000"
    networks:
      - proxy_net
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data: